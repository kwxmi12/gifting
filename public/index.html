  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e16;
      --text: #f0ede8;
      --text-dim: #7a7672;
      --gold: #c8a96e;
      --gold-dim: #8a7249;
      --border: rgba(200, 169, 110, 0.15);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: transform 0.15s ease, opacity 0.3s ease;
    }
    .cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid rgba(200,169,110,0.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: width 0.2s ease, height 0.2s ease, opacity 0.3s ease;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,169,110,0.05) 0%, transparent 70%);
      pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      transition: left 0.8s ease, top 0.8s ease;
    }

    /* Corner accents */
    .corner {
      position: fixed;
      width: 20px; height: 20px;
      border-color: var(--border);
      border-style: solid;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      animation: fadeIn 1s ease 1.4s forwards;
    }
    .corner-tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 24px 32px;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 0.6s forwards;
    }
    .nav-mark {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* Page */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Hero */
    .hero {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(720deg); }
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      margin-bottom: 36px;
      cursor: pointer;
      width: 120px;
      height: 120px;
    }
    .logo-wrap img {
      width: 120px;
      height: 120px;
      display: block;
      filter: drop-shadow(0 0 0px rgba(200,169,110,0));
      transition: filter 0.6s ease;
    }
    .logo-wrap:hover img {
      filter: drop-shadow(0 0 28px rgba(200,169,110,0.55));
    }
    .logo-wrap.spinning img {
      animation: spin 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* Tagline */
    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }
    .est {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin: 0 auto 16px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .divider.visible { opacity: 1; }

    /* Portfolio label */
    .brands-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 32px;
      opacity: 0;
      transition: opacity 0.8s ease 0.2s;
    }
    .brands-label.visible { opacity: 1; }

    /* Brand logos */
    .brands {
      display: flex;
      gap: 52px;
      align-items: center;
      justify-content: center;
    }
    .brand-item {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .brand-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .brand-logo {
      width: 30px;
      height: 30px;
      object-fit: contain;
      /* Gold tint — logos are white on transparent, so sepia+saturate shifts white→gold */
      opacity: 0.7;
      transition: opacity 0.3s ease, transform 0.3s ease, filter 0.3s ease;
      display: block;
    }
    .brand-item:hover .brand-logo {
      opacity: 1;
      transform: scale(1.1);
      opacity: 1;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 20px 32px;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.8s forwards;
    }
    footer span {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
  </style>
</head>

    </div>
  </main>

  <footer>
    <span>© 2026 Three Dudes Limited</span>
  </footer>

  <script>
    // ── Custom cursor ──────────────────────────────────────────────
    // Inject cursor:none via JS so it works even in Brave with shields up
    const s = document.createElement('style');
    s.textContent = 'html, body, * { cursor: none !important; }';
    document.head.appendChild(s);

    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
      cursor.style.opacity = '1';
      ring.style.opacity   = '1';
    });

    (function tickRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(tickRing);
    })();

    // Scale cursor on interactive elements
    document.querySelectorAll('.logo-wrap, .brand-item').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(2.5)';
        ring.style.width  = '52px';
        ring.style.height = '52px';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)';
        ring.style.width  = '32px';
        ring.style.height = '32px';
      });
    });

    // ── Glow follows mouse ─────────────────────────────────────────
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top  = e.clientY + 'px';
    });

    // ── Logo spin + portfolio toggle ───────────────────────────────
    const logoWrap    = document.getElementById('logoWrap');
    const divider     = document.getElementById('divider');
    const brandsLabel = document.getElementById('brandsLabel');
    const b1 = document.getElementById('b1');
    const b2 = document.getElementById('b2');
    const b3 = document.getElementById('b3');
    let revealed = false;
    let spinning = false;

    logoWrap.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;

      // Restart spin animation each click
      logoWrap.classList.remove('spinning');
      void logoWrap.offsetWidth; // force reflow
      logoWrap.classList.add('spinning');

      if (!revealed) {
        // Reveal after spin
        setTimeout(() => {
          revealed = true;
          spinning = false;
          divider.classList.add('visible');
          brandsLabel.classList.add('visible');
          setTimeout(() => b1.classList.add('visible'), 200);
          setTimeout(() => b2.classList.add('visible'), 400);
          setTimeout(() => b3.classList.add('visible'), 600);
        }, 1300);
      } else {
        // Hide after spin — reverse stagger
        setTimeout(() => {
          revealed = false;
          spinning = false;
          b3.classList.remove('visible');
          setTimeout(() => b2.classList.remove('visible'), 150);
          setTimeout(() => b1.classList.remove('visible'), 300);
          setTimeout(() => {
            brandsLabel.classList.remove('visible');
            divider.classList.remove('visible');
          }, 500);
        }, 1300);
      }
    });
  </script>

</body>
</html>
